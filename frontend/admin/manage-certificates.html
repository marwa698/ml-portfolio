<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Certificates | Admin Panel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <div class="admin-body">
    <aside class="admin-sidebar" id="admin-sidebar"></aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <div>
          <h1 class="admin-page-title">Certificates</h1>
          <p class="admin-page-sub">Add, edit, or remove your certifications</p>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
          <button class="icon-toggle" id="theme-toggle-btn" aria-label="Toggle theme">☀️</button>
          <button class="btn btn-primary" id="add-certificate-btn">
            <i class="fa-solid fa-plus"></i> Add certificate
          </button>
        </div>
      </div>

      <div class="admin-table-card">
        <table class="admin-table">
          <thead>
            <tr>
              <th></th>
              <th>Title</th>
              <th>Issuer</th>
              <th>Year</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="certificates-table-body">
            <tr><td colspan="5" class="admin-empty">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- ============ Modal: إضافة / تعديل شهادة ============ -->
  <div class="modal-overlay" id="certificate-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title" id="certificate-modal-title">Add certificate</h3>
        <button class="modal-close-btn" id="certificate-modal-close"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <form id="certificate-form">
        <input type="hidden" id="certificate-id" />

        <div class="modal-form-group">
          <label>Certificate title</label>
          <input type="text" id="certificate-title" class="form-input" placeholder="Machine Learning Specialization" required />
        </div>

        <div class="modal-form-row">
          <div class="modal-form-group">
            <label>Issuer</label>
            <input type="text" id="certificate-issuer" class="form-input" placeholder="Stanford University" required />
          </div>
          <div class="modal-form-group">
            <label>Year</label>
            <input type="text" id="certificate-year" class="form-input" placeholder="2024" required />
          </div>
        </div>

        <div class="modal-form-group">
          <label>Verification link (optional)</label>
          <input type="url" id="certificate-link" class="form-input" placeholder="https://coursera.org/verify/..." />
        </div>

        <div class="modal-form-group">
          <label>Display order</label>
          <input type="number" id="certificate-order" class="form-input" placeholder="0" value="0" />
        </div>

          <div class="modal-form-group">
  <label>What you learned (shown on details page)</label>
  <textarea id="certificate-description" class="form-textarea" placeholder="Describe what you learned in this course..."></textarea>
</div>

<div class="modal-form-group">
  <label>Related projects (optional, one per line)</label>
  <textarea id="certificate-projects" class="form-textarea" style="min-height: 80px;" placeholder="Project 1 name&#10;Project 2 name"></textarea>
</div>
        <div class="modal-form-group">
  <label>Issuer logo (shown on portfolio cards)</label>
  <div class="file-input-wrap">
    <img id="certificate-logo-preview" class="file-preview" style="display: none;" />
    <input type="file" id="certificate-logo" accept="image/*" />
  </div>
</div>

<div class="modal-form-group">
  <label>Certificate image (shown on details page, optional)</label>
  <div class="file-input-wrap">
    <img id="certificate-cert-image-preview" class="file-preview" style="display: none;" />
    <input type="file" id="certificate-cert-image" accept="image/*" />
  </div>
</div>

        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="certificate-cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="certificate-submit-btn">Save certificate</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/theme-toggle.js"></script>
  <script src="../js/api.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/admin-sidebar.js"></script>
  <script src="js/admin-toast.js"></script>
  <script src="js/manage-certificates.js"></script>
</body>
</html>
